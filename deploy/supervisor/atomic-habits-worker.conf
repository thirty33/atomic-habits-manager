[program:atomic-habits-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/atomic-habits/artisan queue:work sqs --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=deployer
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/atomic-habits/storage/logs/worker.log
stopwaitsecs=3600
