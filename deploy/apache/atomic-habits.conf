<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/atomic-habits/public

    <Directory /var/www/atomic-habits/public/>
        AllowOverride All
        Require all granted
    </Directory>

    # Proxy reverso para Laravel Reverb (WebSockets)
    ProxyPreserveHost On
    ProxyPass /app ws://127.0.0.1:8080/app
    ProxyPassReverse /app ws://127.0.0.1:8080/app

    ErrorLog /var/log/apache2/atomic-habits-error.log
    CustomLog /var/log/apache2/atomic-habits-access.log combined
</VirtualHost>
